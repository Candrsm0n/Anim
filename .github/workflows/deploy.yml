name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install SSH and rsync
        run: |
          sudo apt update
          sudo apt install -y openssh-client rsync

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload files to VPS
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude "cache" \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/Anim/"

      - name: Restart app on VPS
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "bash -s" << 'REMOTE'
          set -e

          cd /var/www/Anim

          mkdir -p cache/images cache/hls

          CHROME_PATH="$(command -v google-chrome-stable || true)"

          printf '%s\n' \
            "PORT=5000" \
            "NODE_ENV=production" \
            "PUPPETEER_EXECUTABLE_PATH=${CHROME_PATH}" \
            "KURAMANIME_CHROMIUM_PATH=${CHROME_PATH}" \
            > .env

          PUPPETEER_SKIP_DOWNLOAD=true npm install --no-audit --no-fund

          npm install -g pm2

          pm2 delete anim 2>/dev/null || true
          pm2 delete animme 2>/dev/null || true
          pm2 delete anime-chan 2>/dev/null || true

          pm2 start server/server.js --name anim --cwd /var/www/Anim --update-env

          pm2 save

          echo "DEPLOY SELESAI"
          REMOTE
